<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 720pt; height: 405pt; font-family: 'Pretendard', sans-serif; background: #F9F7F2; padding: 40pt 56pt; display: flex; flex-direction: column; justify-content: space-between; }
  </style>
</head>
<body>
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <div style="display:flex; align-items:center; gap:8pt;">
      <div style="width:22pt; height:22pt; background:#EC5B13; border-radius:5pt;"></div>
      <span style="font-family:'Noto Serif KR',serif; font-weight:700; font-size:12pt; color:#2C2420;">philo</span>
    </div>
    <span style="font-size:9pt; color:#6B5F56; letter-spacing:0.12em;"></span>
  </div>

  <div style="flex:1; display:flex; align-items:center; gap:48pt; padding-top:8pt;">
    <div style="flex:1;">
      <p style="font-size:9pt; color:#EC5B13; font-weight:700; letter-spacing:0.2em; margin-bottom:18pt;">EXPERIENCE TALK</p>
      <h1 style="font-family:'Noto Serif KR',serif; font-size:52pt; font-weight:700; color:#2C2420; line-height:1.15; letter-spacing:-0.02em;">
        AI 시대,<br>1인 개발자로<br>앱 만들기
      </h1>
      <p style="font-size:12pt; color:#6B5F56; margin-top:20pt;">philo(오늘의철학) 개발 경험 공유</p>
    </div>
    <!-- 우측 장식 -->
    <div style="display:flex; flex-direction:column; gap:10pt; opacity:0.15;">
      <div style="width:6pt; height:80pt; background:#EC5B13; border-radius:3pt;"></div>
      <div style="width:6pt; height:40pt; background:#2C2420; border-radius:3pt;"></div>
      <div style="width:6pt; height:60pt; background:#EC5B13; border-radius:3pt;"></div>
    </div>
  </div>

  <div style="display:flex; justify-content:space-between; align-items:flex-end;">
    <div>
      <p style="font-size:8pt; color:#6B5F56; margin-bottom:3pt;">발표자</p>
      <p style="font-size:13pt; font-weight:700; color:#2C2420;">현진호</p>
      <p style="font-size:9pt; color:#6B5F56; margin-top:4pt;">github.com/neverlish/philo-web</p>
    </div>
    <div style="text-align:right;">
      <p style="font-size:8pt; color:#6B5F56; margin-bottom:3pt;">서비스</p>
      <p style="font-size:13pt; font-weight:700; color:#EC5B13;">philo-web.vercel.app</p>
    </div>
  </div>
</body>
</html>
