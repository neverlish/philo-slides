<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 720pt; height: 405pt; font-family: 'Pretendard', sans-serif; background: #2C2420; padding: 40pt 56pt; display: flex; flex-direction: column; justify-content: space-between; }
  </style>
</head>
<body>
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <div style="display:flex; align-items:center; gap:8pt;">
      <div style="width:22pt; height:22pt; background:#EC5B13; border-radius:5pt;"></div>
      <span style="font-family:'Noto Serif KR',serif; font-weight:700; font-size:12pt; color:#F9F7F2;">philo</span>
    </div>
    <p style="font-size:10pt; color:#6B5F56;">24 / 24</p>
  </div>

  <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:32pt;">
    <p style="font-family:'Noto Serif KR',serif; font-size:42pt; font-weight:700; color:#F9F7F2; letter-spacing:-0.02em;">감사합니다</p>

    <div style="display:flex; gap:24pt;">
      <div style="background:#3d3430; border-radius:12pt; padding:18pt 28pt; text-align:center;">
        <p style="font-size:8pt; color:#9a8a82; font-weight:600; letter-spacing:0.15em; margin-bottom:10pt;">서비스</p>
        <p style="font-size:14pt; font-weight:700; color:#EC5B13;">philo-web.vercel.app</p>
      </div>
      <div style="background:#3d3430; border-radius:12pt; padding:18pt 28pt; text-align:center;">
        <p style="font-size:8pt; color:#9a8a82; font-weight:600; letter-spacing:0.15em; margin-bottom:10pt;">GitHub</p>
        <p style="font-size:14pt; font-weight:700; color:#F9F7F2;">github.com/neverlish/philo-web</p>
      </div>
    </div>
  </div>
</body>
</html>
