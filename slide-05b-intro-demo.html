<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 720pt; height: 405pt; font-family: 'Pretendard', sans-serif; background: #2C2420; padding: 40pt 56pt; display: flex; flex-direction: column; }
  </style>

<body>
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20pt;">

    </div>
    <p style="font-size:10pt; color:#6B5F56;">8 / 27</p>
  </div>

  <div style="flex:1; display:flex; align-items:center; justify-content:center; gap:36pt;">
    <!-- 왼쪽: 설명 -->
    <div style="display:flex; flex-direction:column; gap:12pt; min-width:160pt;">
      <div style="display:flex; align-items:center; gap:10pt;">
        <span style="color:#EC5B13; font-size:13pt; font-weight:800;">1</span>
        <p style="font-size:10pt; color:#F9F7F2; line-height:1.6;">오늘의 고민을 입력</p>
      </div>
      <div style="display:flex; align-items:center; gap:10pt;">

        <p style="font-size:10pt; color:#F9F7F2; line-height:1.6;">Claude API가 철학자 매칭</p>
      </div>
      <div style="display:flex; align-items:center; gap:10pt;">
        <span style="color:#EC5B13; font-size:13pt; font-weight:800;">3</span>
        <p style="font-size:10pt; color:#F9F7F2; line-height:1.6;">의미 해석 + 실천 방법 제공</p>
      </div>
    </div>

    <!-- 가운데: 영상 -->
    <div style="height:310pt; border-radius:14pt; overflow:hidden; box-shadow:0 8pt 40pt rgba(0,0,0,0.5); flex-shrink:0;">
      <video src="intro.mp4" autoplay muted loop playsinline style="height:100%; width:auto; display:block;"></video>
    </div>
  </div>

</html>
