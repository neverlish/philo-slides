<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 720pt; height: 405pt; font-family: 'Pretendard', sans-serif; background: #F9F7F2; padding: 40pt 56pt; display: flex; flex-direction: column; }
  </style>
</head>
<body>
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20pt;">
    <div style="display:flex; align-items:center; gap:10pt;">
      <p style="padding:3pt 10pt; background:#EC5B13; color:#fff; border-radius:4pt; font-size:8pt; font-weight:700;">SECTION 04 — 개발</p>
      <h2 style="font-family:'Noto Serif KR',serif; font-size:20pt; font-weight:600; color:#2C2420;">철학자 유형 퀴즈</h2>
    </div>
    <p style="font-size:10pt; color:#6B5F56;">21 / 27</p>
  </div>

  <div style="flex:1; display:flex; align-items:center; justify-content:center; gap:36pt;">
    <!-- 왼쪽: 설명 -->
    <div style="display:flex; flex-direction:column; gap:12pt; min-width:160pt;">
      <p style="font-family:'Noto Serif KR',serif; font-size:13pt; font-weight:600; color:#2C2420; line-height:1.7;">
        MBTI처럼 질문에 답하면<br>나와 닮은 철학자 결과 제공
      </p>
      <div style="display:flex; flex-direction:column; gap:7pt;">
        <div style="display:flex; align-items:center; gap:8pt;">
          <div style="width:6pt; height:6pt; background:#EC5B13; border-radius:50%; flex-shrink:0;"></div>
          <p style="font-size:9pt; color:#6B5F56;">바이럴 유입용 랜딩 기능</p>
        </div>
        <div style="display:flex; align-items:center; gap:8pt;">
          <div style="width:6pt; height:6pt; background:#EC5B13; border-radius:50%; flex-shrink:0;"></div>
          <p style="font-size:9pt; color:#6B5F56;">결과 공유 → 친구 초대 유도</p>
        </div>
        <div style="display:flex; align-items:center; gap:8pt;">
          <div style="width:6pt; height:6pt; background:#EC5B13; border-radius:50%; flex-shrink:0;"></div>
          <p style="font-size:9pt; color:#6B5F56;">Stitch 디자인 + Claude 구현</p>
        </div>
      </div>
    </div>

    <!-- 가운데: 영상 -->
    <div style="height:310pt; border-radius:14pt; overflow:hidden; box-shadow:0 6pt 32pt rgba(44,36,32,0.18); border:1px solid #e0d8d4; flex-shrink:0;">
      <video src="quiz.mp4" autoplay muted loop playsinline style="height:100%; width:auto; display:block;"></video>
    </div>
  </div>
</body>
</html>
