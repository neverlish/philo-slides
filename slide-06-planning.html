<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 720pt; height: 405pt; font-family: 'Pretendard', sans-serif; background: #F9F7F2; padding: 40pt 56pt; display: flex; flex-direction: column; }
  </style>
</head>
<body>
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:28pt;">
    <div style="display:flex; align-items:center; gap:10pt;">
      <p style="padding:3pt 10pt; background:#EC5B13; color:#fff; border-radius:4pt; font-size:8pt; font-weight:700;">SECTION 02 — 기획</p>
      <h2 style="font-family:'Noto Serif KR',serif; font-size:20pt; font-weight:600; color:#2C2420;">기획 — 반복이 답이다</h2>
    </div>
    <p style="font-size:10pt; color:#6B5F56;">6 / 20</p>
  </div>

  <div style="flex:1; display:grid; grid-template-columns:1.1fr 1fr; gap:24pt;">
    <div style="display:flex; flex-direction:column; gap:10pt;">
      <div style="display:flex; gap:12pt; align-items:flex-start; background:#fff; border-radius:10pt; padding:14pt 16pt;">
        <div style="min-width:32pt; height:32pt; background:#EC5B13; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13pt; font-weight:800; color:#fff;">1</div>
        <div>
          <p style="font-size:12pt; font-weight:700; color:#2C2420; margin-bottom:3pt;">아이디어 발산</p>
          <p style="font-size:9pt; color:#6B5F56; line-height:1.6;">Claude와 함께 여러 방향으로 기획 반복. 바이럴 페이지, 리텐션 전략, 비즈니스 모델까지</p>
        </div>
      </div>
      <div style="display:flex; gap:12pt; align-items:flex-start; background:#fff; border-radius:10pt; padding:14pt 16pt;">
        <div style="min-width:32pt; height:32pt; background:#EC5B13; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13pt; font-weight:800; color:#fff;">2</div>
        <div>
          <p style="font-size:12pt; font-weight:700; color:#2C2420; margin-bottom:3pt;">문서화</p>
          <p style="font-size:9pt; color:#6B5F56; line-height:1.6;">SPEC · 사용자 여정 · KPI · 기능 목록을 마크다운으로 정리. 코드보다 먼저 글로 완성</p>
        </div>
      </div>
      <div style="display:flex; gap:12pt; align-items:flex-start; background:#fff; border-radius:10pt; padding:14pt 16pt;">
        <div style="min-width:32pt; height:32pt; background:#EC5B13; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13pt; font-weight:800; color:#fff;">3</div>
        <div>
          <p style="font-size:12pt; font-weight:700; color:#2C2420; margin-bottom:3pt;">개발 중에도 기획으로</p>
          <p style="font-size:9pt; color:#6B5F56; line-height:1.6;">방향이 흔들리면 문서로 돌아와 다시 잡음. 기획 = 나침반</p>
        </div>
      </div>
    </div>

    <div style="display:flex; flex-direction:column; gap:12pt;">
      <div style="background:#2C2420; border-radius:12pt; padding:20pt; flex:1;">
        <p style="font-size:9pt; color:#EC5B13; font-weight:700; letter-spacing:0.12em; margin-bottom:12pt;">KEY INSIGHT</p>
        <p style="font-family:'Noto Serif KR',serif; font-size:16pt; font-weight:600; color:#F9F7F2; line-height:1.65;">"만들기 전에 충분히<br>생각하면<br>코드가 단순해진다"</p>
      </div>
      <div style="background:#fff; border-radius:10pt; padding:8pt; overflow:hidden;">
        <p style="font-size:9pt; color:#6B5F56; font-weight:600; margin-bottom:6pt;">실제 플랜 파일 목록</p>
        <div style="height:100pt; overflow:hidden; border-radius:6pt;">
          <img src="iteration-plans.png" style="width:100%; display:block; object-fit:cover; object-position:top;">
        </div>
      </div>
    </div>
  </div>
</body>
</html>
