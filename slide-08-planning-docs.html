<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 720pt; height: 405pt; font-family: 'Pretendard', sans-serif; background: #2C2420; padding: 40pt 56pt; display: flex; flex-direction: column; }
    .tag { display:inline-block; padding:2pt 8pt; background:#EC5B13; color:#fff; border-radius:4pt; font-size:8pt; font-weight:600; }
  </style>
</head>
<body>
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24pt;">
    <div style="display:flex; align-items:center; gap:10pt;">
      <p style="padding:3pt 10pt; background:#EC5B13; color:#fff; border-radius:4pt; font-size:8pt; font-weight:700;">SECTION 02 — 기획</p>
      <h2 style="font-family:'Noto Serif KR',serif; font-size:20pt; font-weight:600; color:#F9F7F2;">기획 문서 구조</h2>
    </div>
    <p style="font-size:10pt; color:#6B5F56;">11 / 27</p>
  </div>

  <div style="flex:1; display:grid; grid-template-columns:1fr 1fr; gap:16pt;">
    <!-- 왼쪽: 실제 문서 구조 스크린샷 -->
    <div style="background:#1e1916; border-radius:12pt; overflow:hidden; display:flex; align-items:center; justify-content:center;">
      <img src="initial-plan-docs.png" style="max-height:100%; max-width:100%; object-fit:contain; border-radius:8pt;">
    </div>

    <!-- 오른쪽: 핵심 문서 내용 미리보기 -->
    <div style="display:flex; flex-direction:column; gap:10pt;">
      <div style="background:#3d3430; border-radius:10pt; padding:14pt 16pt;">
        <div style="display:flex; align-items:center; gap:8pt; margin-bottom:8pt;">
          <p class="tag">SPEC.md</p>
        </div>
        <p style="font-size:9pt; color:#9a8a82; line-height:1.7;">타겟 · 비전 · 기능 · 기술스택 · 개발 단계 · Phase 1-3 로드맵을 한 문서에 정리</p>
      </div>
      <div style="background:#3d3430; border-radius:10pt; padding:14pt 16pt;">
        <div style="display:flex; align-items:center; gap:8pt; margin-bottom:8pt;">
          <p class="tag">implementation.md</p>
        </div>
        <p style="font-size:9pt; color:#9a8a82; line-height:1.7;">Task 1~15 단계별 구현 계획. Claude에게 직접 넘겨 실행시키는 플랜 문서</p>
      </div>
      <div style="background:#EC5B1320; border-radius:10pt; padding:14pt 16pt; border:1px solid #EC5B1340;">
        <p style="font-size:9pt; color:#EC5B13; font-weight:700; margin-bottom:6pt;">핵심 원칙</p>
        <p style="font-size:10pt; color:#F9F7F2; line-height:1.7;">문서가 완성되면 Claude는 그걸 그대로 실행합니다. <strong>기획자 = 프롬프트 엔지니어</strong></p>
      </div>
    </div>
  </div>
</body>
</html>
