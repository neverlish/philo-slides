<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 720pt; height: 405pt; font-family: 'Pretendard', sans-serif; background: #2C2420; padding: 40pt 56pt; display: flex; flex-direction: column; }
  </style>
</head>
<body>
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:22pt;">
    <div style="display:flex; align-items:center; gap:10pt;">
      <p style="padding:3pt 10pt; background:#EC5B13; color:#fff; border-radius:4pt; font-size:8pt; font-weight:700;">LESSON LEARNED</p>
      <h2 style="font-family:'Noto Serif KR',serif; font-size:20pt; font-weight:600; color:#F9F7F2;">솔직하게 배운 것들</h2>
    </div>
    <p style="font-size:10pt; color:#6B5F56;">21 / 22</p>
  </div>

  <div style="flex:1; display:flex; flex-direction:column; gap:9pt; justify-content:center;">

    <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:9pt;">
      <div style="background:#3d3430; border-radius:10pt; padding:13pt 14pt;">
        <p style="font-size:8pt; color:#9a8a82; margin-bottom:6pt; line-height:1.5;">"뭔가 어색해"<br>"밋밋해 바꿔보자"</p>
        <p style="width:100%; height:1px; background:#4a4040; margin-bottom:6pt;"></p>
        <p style="font-family:'Noto Serif KR',serif; font-size:10pt; color:#F9F7F2; line-height:1.6;">정확한 답을 몰라도<br>느낌만 말해도 됐다</p>
      </div>

      <div style="background:#3d3430; border-radius:10pt; padding:13pt 14pt;">
        <p style="font-size:8pt; color:#9a8a82; margin-bottom:6pt; line-height:1.5;">새벽에 날짜 버그<br>→ CLAUDE.md에 규칙 추가</p>
        <p style="width:100%; height:1px; background:#4a4040; margin-bottom:6pt;"></p>
        <p style="font-family:'Noto Serif KR',serif; font-size:10pt; color:#F9F7F2; line-height:1.6;">불편함이 먼저였다<br>도구는 나중에 왔다</p>
      </div>

      <div style="background:#3d3430; border-radius:10pt; padding:13pt 14pt;">
        <p style="font-size:8pt; color:#9a8a82; margin-bottom:6pt; line-height:1.5;">터미널 왔다갔다 귀찮아<br>→ Supabase MCP 연결</p>
        <p style="width:100%; height:1px; background:#4a4040; margin-bottom:6pt;"></p>
        <p style="font-family:'Noto Serif KR',serif; font-size:10pt; color:#F9F7F2; line-height:1.6;">귀찮음이 세팅을<br>만들게 했다</p>
      </div>
    </div>

    <div style="background:#EC5B13; border-radius:10pt; padding:14pt 20pt;">
      <p style="font-family:'Noto Serif KR',serif; font-size:13pt; font-weight:700; color:#fff; line-height:1.6; text-align:center;">
        "좋은 프롬프트보다 솔직한 불편함이 더 강력했다"
      </p>
    </div>

  </div>
</body>
</html>
