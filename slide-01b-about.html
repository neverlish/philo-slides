<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 720pt; height: 405pt; font-family: 'Pretendard', sans-serif; background: #F9F7F2; padding: 40pt 56pt; display: flex; flex-direction: column; }
  </style>
</head>
<body>
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:32pt;">
    <div style="display:flex; align-items:center; gap:10pt;">
      <p style="padding:3pt 10pt; background:#EC5B13; color:#fff; border-radius:4pt; font-size:8pt; font-weight:700;">ABOUT ME</p>
      <h2 style="font-family:'Noto Serif KR',serif; font-size:20pt; font-weight:600; color:#2C2420;">발표자 소개</h2>
    </div>
    <p style="font-size:10pt; color:#6B5F56;">2 / 23</p>
  </div>

  <div style="flex:1; display:grid; grid-template-columns:1fr 1fr; gap:24pt; align-items:stretch;">
    <!-- 왼쪽: 개인 소개 -->
    <div style="display:flex; flex-direction:column; justify-content:center; gap:8pt;">
      <p style="font-size:8pt; color:#EC5B13; font-weight:700; letter-spacing:0.15em;">WHO AM I</p>
      <p style="font-family:'Noto Serif KR',serif; font-size:32pt; font-weight:700; color:#2C2420; line-height:1.2;">9년차<br>개발자</p>
    </div>

    <!-- 오른쪽: 고민 + 목표 -->
    <div style="display:flex; flex-direction:column; gap:10pt;">
      <div style="background:#2C2420; border-radius:12pt; padding:18pt 20pt;">
        <p style="font-size:8pt; color:#EC5B13; font-weight:700; letter-spacing:0.15em; margin-bottom:10pt;">앞으로의 고민</p>
        <p style="font-family:'Noto Serif KR',serif; font-size:12pt; font-weight:600; color:#F9F7F2; line-height:1.8;">
          코딩을 직접 하지 않고도<br>결과물을 만들고, 사람이 쓸 수 있게
        </p>
      </div>
      <div style="background:#EC5B13; border-radius:12pt; padding:18pt 20pt;">
        <p style="font-size:8pt; color:rgba(255,255,255,0.7); font-weight:700; letter-spacing:0.15em; margin-bottom:10pt;">이번 프로젝트의 목표</p>
        <p style="font-family:'Noto Serif KR',serif; font-size:12pt; font-weight:600; color:#fff; line-height:1.8;">
          기획 · 디자인 · 개발 · 배포까지<br>코딩 없이 끝내고, 실사용자 지표 받아보기
        </p>
      </div>
    </div>
  </div>

  <div style="margin-top:12pt; display:flex; gap:16pt;">
    <div style="display:flex; align-items:center; gap:6pt;">
      <span style="font-size:8pt; color:#6B5F56; font-weight:600;">서비스</span>
      <span style="font-size:9pt; font-weight:700; color:#EC5B13;">philo-web.vercel.app</span>
    </div>
    <div style="width:1px; background:#e0d8d4;"></div>
    <div style="display:flex; align-items:center; gap:6pt;">
      <span style="font-size:8pt; color:#6B5F56; font-weight:600;">GitHub</span>
      <span style="font-size:9pt; font-weight:700; color:#2C2420;">github.com/neverlish/philo-web</span>
    </div>
  </div>
</body>
</html>
