<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 720pt; height: 405pt; font-family: 'Pretendard', sans-serif; background: #F9F7F2; padding: 40pt 56pt; display: flex; flex-direction: column; }
  </style>
</head>
<body>
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:32pt;">
    <div style="display:flex; align-items:center; gap:10pt;">
      <p style="padding:3pt 10pt; background:#EC5B13; color:#fff; border-radius:4pt; font-size:8pt; font-weight:700;">ABOUT ME</p>
      <h2 style="font-family:'Noto Serif KR',serif; font-size:20pt; font-weight:600; color:#2C2420;">발표자 소개</h2>
    </div>
    <p style="font-size:10pt; color:#6B5F56;">2 / 23</p>
  </div>

  <div style="flex:1; display:grid; grid-template-columns:1fr 1fr; gap:32pt; align-items:center;">
    <!-- 왼쪽: 개인 소개 -->
    <div style="display:flex; flex-direction:column; gap:20pt;">
      <div>
        <p style="font-size:8pt; color:#EC5B13; font-weight:700; letter-spacing:0.15em; margin-bottom:10pt;">WHO AM I</p>
        <p style="font-family:'Noto Serif KR',serif; font-size:32pt; font-weight:700; color:#2C2420; line-height:1.2;">9년차<br>개발자</p>
        <p style="font-size:11pt; color:#6B5F56; margin-top:10pt; font-weight:600;">neverlish</p>
      </div>
    </div>

    <!-- 오른쪽: 앞으로의 고민 -->
    <div style="background:#2C2420; border-radius:14pt; padding:28pt 24pt;">
      <p style="font-size:8pt; color:#EC5B13; font-weight:700; letter-spacing:0.15em; margin-bottom:16pt;">앞으로의 고민</p>
      <p style="font-family:'Noto Serif KR',serif; font-size:14pt; font-weight:600; color:#F9F7F2; line-height:1.9;">
        코딩을 직접 하지 않고도<br>결과물을 만들고,<br>사람이 쓸 수 있게 만드는 것
      </p>
    </div>
  </div>
</body>
</html>
