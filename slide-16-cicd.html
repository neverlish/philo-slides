<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 720pt; height: 405pt; font-family: 'Pretendard', sans-serif; background: #F9F7F2; padding: 40pt 56pt; display: flex; flex-direction: column; }
  </style>
</head>
<body>
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:28pt;">
    <div style="display:flex; align-items:center; gap:10pt;">
      <p style="padding:3pt 10pt; background:#EC5B13; color:#fff; border-radius:4pt; font-size:8pt; font-weight:700;">SECTION 05 — 인프라</p>
      <h2 style="font-family:'Noto Serif KR',serif; font-size:20pt; font-weight:600; color:#2C2420;">CI/CD 파이프라인</h2>
    </div>
    <p style="font-size:10pt; color:#6B5F56;">19 / 20</p>
  </div>

  <!-- 파이프라인 다이어그램 -->
  <div style="flex:1; display:flex; flex-direction:column; justify-content:center; gap:16pt;">
    <div style="display:flex; align-items:center; gap:0; width:100%;">
      <div style="flex:1; background:#2C2420; border-radius:10pt; padding:14pt; text-align:center;">
        <p style="font-size:16pt; margin-bottom:4pt;">💻</p>
        <p style="font-size:10pt; font-weight:700; color:#F9F7F2;">코드 작성</p>
        <p style="font-size:8pt; color:#6B5F56; margin-top:3pt;">로컬 개발<br>Claude와 협업</p>
      </div>
      <div style="padding:0 8pt; color:#EC5B13; font-size:16pt; font-weight:700;">→</div>
      <div style="flex:1; background:#fff; border-radius:10pt; padding:14pt; text-align:center; border:1px solid #e0d8d4;">
        <p style="font-size:16pt; margin-bottom:4pt;">🐙</p>
        <p style="font-size:10pt; font-weight:700; color:#2C2420;">git push</p>
        <p style="font-size:8pt; color:#6B5F56; margin-top:3pt;">GitHub<br>PR or main</p>
      </div>
      <div style="padding:0 8pt; color:#EC5B13; font-size:16pt; font-weight:700;">→</div>
      <div style="flex:1; background:#fff; border-radius:10pt; padding:14pt; text-align:center; border:1px solid #e0d8d4;">
        <p style="font-size:16pt; margin-bottom:4pt;">🔧</p>
        <p style="font-size:10pt; font-weight:700; color:#2C2420;">GitHub Actions</p>
        <p style="font-size:8pt; color:#6B5F56; margin-top:3pt;">TypeScript 체크<br>빌드 검증</p>
      </div>
      <div style="padding:0 8pt; color:#EC5B13; font-size:16pt; font-weight:700;">→</div>
      <div style="flex:1; background:#EC5B13; border-radius:10pt; padding:14pt; text-align:center;">
        <p style="font-size:16pt; margin-bottom:4pt;">▲</p>
        <p style="font-size:10pt; font-weight:700; color:#fff;">Vercel 배포</p>
        <p style="font-size:8pt; color:#ffdbce; margin-top:3pt;">자동 배포<br>Preview URL</p>
      </div>
    </div>

    <!-- 브랜치 전략 -->
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12pt;">
      <div style="background:#fff; border-radius:8pt; padding:14pt 16pt;">
        <p style="font-size:9pt; color:#EC5B13; font-weight:700; margin-bottom:6pt;">PR 브랜치</p>
        <p style="font-size:10pt; color:#2C2420; line-height:1.7;">Preview URL 자동 생성 → 배포 전 확인 가능<br><span style="color:#6B5F56; font-size:9pt;">philo-xxx.vercel.app</span></p>
      </div>
      <div style="background:#fff; border-radius:8pt; padding:14pt 16pt;">
        <p style="font-size:9pt; color:#EC5B13; font-weight:700; margin-bottom:6pt;">main 브랜치</p>
        <p style="font-size:10pt; color:#2C2420; line-height:1.7;">푸시 즉시 프로덕션 배포<br><span style="color:#6B5F56; font-size:9pt;">philo-web.vercel.app</span></p>
      </div>
    </div>
  </div>
</body>
</html>
