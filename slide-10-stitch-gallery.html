<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 720pt; height: 405pt; font-family: 'Pretendard', sans-serif; background: #2C2420; padding: 36pt 48pt; display: flex; flex-direction: column; }
  </style>
</head>
<body>
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20pt;">
    <div style="display:flex; align-items:center; gap:10pt;">
      <p style="padding:3pt 10pt; background:#EC5B13; color:#fff; border-radius:4pt; font-size:8pt; font-weight:700;">SECTION 03 — 디자인</p>
      <h2 style="font-family:'Noto Serif KR',serif; font-size:20pt; font-weight:600; color:#F9F7F2;">Stitch 화면 갤러리</h2>
    </div>
    <p style="font-size:10pt; color:#6B5F56;">12 / 25</p>
  </div>

  <div style="flex:1; display:grid; grid-template-columns:repeat(4,1fr); gap:10pt; align-items:start;">
    <div style="display:flex; flex-direction:column; gap:6pt;">
      <div style="border-radius:8pt; overflow:hidden; box-shadow:0 4pt 20pt rgba(0,0,0,0.4);">
        <img src="0b86b1c7a223487986c4b6073e107c7d.png" style="width:100%; display:block;" alt="오프닝"/>
      </div>
      <p style="font-size:8pt; color:#9a8a82; text-align:center;">오프닝 — 질문</p>
    </div>
    <div style="display:flex; flex-direction:column; gap:6pt;">
      <div style="border-radius:8pt; overflow:hidden; box-shadow:0 4pt 20pt rgba(0,0,0,0.4);">
        <img src="3595666abbea433fbf994db4599bf394.png" style="width:100%; display:block;" alt="홈"/>
      </div>
      <p style="font-size:8pt; color:#9a8a82; text-align:center;">홈 — 지혜의 다리</p>
    </div>
    <div style="display:flex; flex-direction:column; gap:6pt;">
      <div style="border-radius:8pt; overflow:hidden; box-shadow:0 4pt 20pt rgba(0,0,0,0.4);">
        <img src="58095d23602c4eb19125ff036c6476a0.png" style="width:100%; display:block;" alt="처방"/>
      </div>
      <p style="font-size:8pt; color:#9a8a82; text-align:center;">오늘의 처방</p>
    </div>
    <div style="display:flex; flex-direction:column; gap:6pt;">
      <div style="border-radius:8pt; overflow:hidden; box-shadow:0 4pt 20pt rgba(0,0,0,0.4);">
        <img src="bc3686a8e3eb4a818694f0496c7665ba.png" style="width:100%; display:block;" alt="저장"/>
      </div>
      <p style="font-size:8pt; color:#9a8a82; text-align:center;">저장된 처방전</p>
    </div>
  </div>

  <div style="margin-top:12pt; display:flex; justify-content:center; gap:6pt;">
    <span style="padding:3pt 10pt; border:1px solid #3d3430; border-radius:20pt; font-size:8pt; color:#6B5F56;">총 6화면 디자인</span>
    <span style="padding:3pt 10pt; border:1px solid #3d3430; border-radius:20pt; font-size:8pt; color:#6B5F56;">모바일 퍼스트</span>
    <span style="padding:3pt 10pt; border:1px solid #EC5B13; border-radius:20pt; font-size:8pt; color:#EC5B13;">Stitch → 코드로 바로 구현</span>
  </div>
</body>
</html>
