<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 720pt; height: 405pt; font-family: 'Pretendard', sans-serif; background: #2C2420; padding: 40pt 56pt; display: flex; flex-direction: column; justify-content: center; }
  </style>
</head>
<body>
  <div style="display:flex; flex-direction:column; gap:28pt;">
    <p style="font-family:'Noto Serif KR',serif; font-size:36pt; font-weight:700; color:#F9F7F2; line-height:1.3; letter-spacing:-0.02em;">
      9년 동안 코딩했는데,<br>이번엔 코딩을 안 했습니다.
    </p>

    <div style="display:flex; align-items:center; gap:20pt;">
      <div style="display:flex; align-items:center; gap:10pt;">
        <div style="width:8pt; height:8pt; background:#6B5F56; border-radius:50%;"></div>
        <p style="font-size:11pt; color:#9a8a82;">나의 커밋</p>
        <p style="font-size:16pt; font-weight:800; color:#F9F7F2;">346</p>
      </div>
      <div style="width:1px; height:20pt; background:#3d3430;"></div>
      <div style="display:flex; align-items:center; gap:10pt;">
        <div style="width:8pt; height:8pt; background:#EC5B13; border-radius:50%;"></div>
        <p style="font-size:11pt; color:#9a8a82;">Claude의 커밋</p>
        <p style="font-size:16pt; font-weight:800; color:#EC5B13;">208</p>
      </div>
    </div>
  </div>
</body>
</html>
