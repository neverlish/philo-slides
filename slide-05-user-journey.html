<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 720pt; height: 405pt; font-family: 'Pretendard', sans-serif; background: #F9F7F2; padding: 40pt 56pt; display: flex; flex-direction: column; }
  </style>
</head>
<body>
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:28pt;">
    <div style="display:flex; align-items:center; gap:10pt;">
      <p style="padding:3pt 10pt; background:#EC5B13; color:#fff; border-radius:4pt; font-size:8pt; font-weight:700;">SECTION 01 — 서비스 소개</p>
      <h2 style="font-family:'Noto Serif KR',serif; font-size:20pt; font-weight:600; color:#2C2420;">사용자 여정</h2>
    </div>
    <p style="font-size:10pt; color:#6B5F56;">6 / 23</p>
  </div>

  <!-- 플로우 -->
  <div style="flex:1; display:flex; align-items:center; gap:0;">
    <div style="display:flex; align-items:center; width:100%; gap:0;">

      <div style="display:flex; flex-direction:column; align-items:center; gap:8pt; flex:1;">
        <div style="width:48pt; height:48pt; background:#2C2420; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:22pt;">🚪</div>
        <p style="font-size:10pt; font-weight:700; color:#2C2420; text-align:center;">첫 방문</p>
        <p style="font-size:8pt; color:#6B5F56; text-align:center; line-height:1.6;">오프닝 화면<br>서비스 소개</p>
      </div>

      <div style="height:2pt; flex:0.4; background:linear-gradient(to right, #2C2420, #EC5B13); opacity:0.3; margin-bottom:32pt;"></div>

      <div style="display:flex; flex-direction:column; align-items:center; gap:8pt; flex:1;">
        <div style="width:48pt; height:48pt; background:#EC5B13; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:22pt;">💬</div>
        <p style="font-size:10pt; font-weight:700; color:#2C2420; text-align:center;">고민 입력</p>
        <p style="font-size:8pt; color:#6B5F56; text-align:center; line-height:1.6;">텍스트 or 음성으로<br>오늘의 고민 이야기</p>
      </div>

      <div style="height:2pt; flex:0.4; background:linear-gradient(to right, #EC5B13, #EC5B13); opacity:0.3; margin-bottom:32pt;"></div>

      <div style="display:flex; flex-direction:column; align-items:center; gap:8pt; flex:1;">
        <div style="width:48pt; height:48pt; background:#EC5B13; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:22pt;">🌿</div>
        <p style="font-size:10pt; font-weight:700; color:#2C2420; text-align:center;">처방 생성</p>
        <p style="font-size:8pt; color:#6B5F56; text-align:center; line-height:1.6;">AI가 맞는 철학자<br>명언 매칭</p>
      </div>

      <div style="height:2pt; flex:0.4; background:linear-gradient(to right, #EC5B13, #EC5B13); opacity:0.3; margin-bottom:32pt;"></div>

      <div style="display:flex; flex-direction:column; align-items:center; gap:8pt; flex:1;">
        <div style="width:48pt; height:48pt; background:#EC5B13; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:22pt;">📌</div>
        <p style="font-size:10pt; font-weight:700; color:#2C2420; text-align:center;">실천하기</p>
        <p style="font-size:8pt; color:#6B5F56; text-align:center; line-height:1.6;">오늘의 다짐 입력<br>저장 · 공유</p>
      </div>

      <div style="height:2pt; flex:0.4; background:linear-gradient(to right, #EC5B13, #2C2420); opacity:0.3; margin-bottom:32pt;"></div>

      <div style="display:flex; flex-direction:column; align-items:center; gap:8pt; flex:1;">
        <div style="width:48pt; height:48pt; background:#2C2420; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:22pt;">🔔</div>
        <p style="font-size:10pt; font-weight:700; color:#2C2420; text-align:center;">재방문</p>
        <p style="font-size:8pt; color:#6B5F56; text-align:center; line-height:1.6;">웹푸시 알림<br>다음날 처방 받기</p>
      </div>

    </div>
  </div>

  <!-- 하단 타겟 -->
  <div style="display:flex; gap:10pt; padding-top:16pt; border-top:1px solid #e0d8d4;">
    <p style="font-size:9pt; color:#6B5F56; font-weight:600; min-width:40pt;">타겟:</p>
    <div style="display:flex; gap:8pt; flex-wrap:wrap;">
      <span style="padding:4pt 12pt; background:#fff; border-radius:20pt; font-size:9pt; color:#2C2420; border:1px solid #e0d8d4;">철학 입문자</span>
      <span style="padding:4pt 12pt; background:#fff; border-radius:20pt; font-size:9pt; color:#2C2420; border:1px solid #e0d8d4;">20-30대 고민형</span>
      <span style="padding:4pt 12pt; background:#fff; border-radius:20pt; font-size:9pt; color:#2C2420; border:1px solid #e0d8d4;">자기계발형</span>
      <span style="padding:4pt 12pt; background:#fff; border-radius:20pt; font-size:9pt; color:#2C2420; border:1px solid #e0d8d4;">힐링 Seeker</span>
    </div>
  </div>
</body>
</html>
