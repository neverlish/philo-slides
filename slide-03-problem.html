<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 720pt; height: 405pt; font-family: 'Pretendard', sans-serif; background: #F9F7F2; padding: 40pt 56pt; display: flex; flex-direction: column; }
  </style>
</head>
<body>
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:28pt;">
    <div style="display:flex; align-items:center; gap:10pt;">
      <p style="padding:3pt 10pt; background:#EC5B13; color:#fff; border-radius:4pt; font-size:8pt; font-weight:700; letter-spacing:0.08em;">SECTION 01 — 서비스 소개</p>
      <h2 style="font-family:'Noto Serif KR',serif; font-size:20pt; font-weight:600; color:#2C2420;">왜 철학 앱인가?</h2>
    </div>
    <p style="font-size:10pt; color:#6B5F56;">5 / 27</p>
  </div>

  <div style="flex:1; display:grid; grid-template-columns:1fr 1fr; gap:20pt; align-items:center;">
    <div>
      <p style="font-size:10pt; color:#6B5F56; font-weight:600; letter-spacing:0.1em; margin-bottom:14pt;">THE PROBLEM</p>
      <div style="display:flex; flex-direction:column; gap:10pt;">
        <div style="background:#fff; border-radius:10pt; padding:14pt 16pt; display:flex; gap:12pt; align-items:flex-start;">
          <span style="font-size:18pt; min-width:24pt;">😰</span>
          <div>
            <p style="font-size:11pt; font-weight:700; color:#2C2420; margin-bottom:3pt;">"철학은 어렵다"</p>
            <p style="font-size:9pt; color:#6B5F56; line-height:1.6;">두꺼운 책, 어려운 용어, 접근 장벽이 높음</p>
          </div>
        </div>
        <div style="background:#fff; border-radius:10pt; padding:14pt 16pt; display:flex; gap:12pt; align-items:flex-start;">
          <span style="font-size:18pt; min-width:24pt;">💭</span>
          <div>
            <p style="font-size:11pt; font-weight:700; color:#2C2420; margin-bottom:3pt;">일상 고민은 많은데</p>
            <p style="font-size:9pt; color:#6B5F56; line-height:1.6;">인간관계, 불안, 시간... 답을 찾을 곳이 없음</p>
          </div>
        </div>
        <div style="background:#fff; border-radius:10pt; padding:14pt 16pt; display:flex; gap:12pt; align-items:flex-start;">
          <span style="font-size:18pt; min-width:24pt;">📱</span>
          <div>
            <p style="font-size:11pt; font-weight:700; color:#2C2420; margin-bottom:3pt;">기존 앱은 딱딱하거나 너무 학문적</p>
            <p style="font-size:9pt; color:#6B5F56; line-height:1.6;">일반인 입장에서 친근하게 다가오지 않음</p>
          </div>
        </div>
      </div>
    </div>

    <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16pt;">
      <div style="background:#2C2420; border-radius:16pt; padding:28pt 24pt; text-align:center; width:100%;">
        <p style="font-size:10pt; color:#EC5B13; font-weight:700; letter-spacing:0.12em; margin-bottom:14pt;">OUR ANSWER</p>
        <p style="font-family:'Noto Serif KR',serif; font-size:18pt; font-weight:600; color:#F9F7F2; line-height:1.6;">
          매일 1분,<br>
          <span style="color:#EC5B13;">내 고민에 맞는</span><br>
          철학자의 처방
        </p>
      </div>
      <p style="font-size:10pt; color:#6B5F56; text-align:center; line-height:1.7;">어렵지 않게, 하지만 너무 가볍지 않게<br>적당한 깊이의 따뜻한 경험</p>
    </div>
  </div>
</body>
</html>
