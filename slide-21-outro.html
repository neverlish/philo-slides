<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 720pt; height: 405pt; font-family: 'Pretendard', sans-serif; background: #F9F7F2; padding: 40pt 56pt; display: flex; flex-direction: column; }
  </style>
</head>
<body>
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:28pt;">
    <div style="display:flex; align-items:center; gap:10pt;">
      <p style="padding:3pt 10pt; background:#EC5B13; color:#fff; border-radius:4pt; font-size:8pt; font-weight:700;">WHAT'S NEXT</p>
      <h2 style="font-family:'Noto Serif KR',serif; font-size:20pt; font-weight:600; color:#2C2420;">다음 고민</h2>
    </div>
    <p style="font-size:10pt; color:#6B5F56;">22 / 22</p>
  </div>

  <div style="flex:1; display:flex; flex-direction:column; gap:14pt; justify-content:center;">
    <div style="background:#2C2420; border-radius:12pt; padding:22pt 26pt;">
      <p style="font-size:8pt; color:#9a8a82; font-weight:600; letter-spacing:0.15em; margin-bottom:12pt;">만들고 나서 알게 된 것</p>
      <p style="font-family:'Noto Serif KR',serif; font-size:16pt; font-weight:600; color:#F9F7F2; line-height:1.65;">
        코딩 없이도 무언가를 만드는 것, 훨씬 편해졌다
      </p>
    </div>

    <div style="background:#EC5B13; border-radius:12pt; padding:22pt 26pt;">
      <p style="font-size:8pt; color:rgba(255,255,255,0.65); font-weight:600; letter-spacing:0.15em; margin-bottom:12pt;">그래서 생긴 새 고민</p>
      <p style="font-family:'Noto Serif KR',serif; font-size:18pt; font-weight:700; color:#fff; line-height:1.5;">
        어떻게 알릴까
      </p>
    </div>
  </div>
</body>
</html>
