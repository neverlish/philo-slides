<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 720pt; height: 405pt; font-family: 'Pretendard', sans-serif; background: #2C2420; display: flex; }
  </style>
</head>
<body>
  <!-- 왼쪽: 해결한 것들 -->
  <div style="flex:1; padding:40pt 40pt 40pt 56pt; display:flex; flex-direction:column; justify-content:center; gap:16pt;">
    <p style="font-size:8pt; color:#6B5F56; font-weight:700; letter-spacing:0.2em;">DONE</p>
    <div style="display:flex; flex-direction:column; gap:10pt;">
      <div style="display:flex; align-items:center; gap:12pt;">
        <span style="color:#EC5B13; font-size:14pt; font-weight:800;">✓</span>
        <p style="font-family:'Noto Serif KR',serif; font-size:16pt; font-weight:600; color:#F9F7F2;">기획</p>
      </div>
      <div style="display:flex; align-items:center; gap:12pt;">
        <span style="color:#EC5B13; font-size:14pt; font-weight:800;">✓</span>
        <p style="font-family:'Noto Serif KR',serif; font-size:16pt; font-weight:600; color:#F9F7F2;">디자인</p>
      </div>
      <div style="display:flex; align-items:center; gap:12pt;">
        <span style="color:#EC5B13; font-size:14pt; font-weight:800;">✓</span>
        <p style="font-family:'Noto Serif KR',serif; font-size:16pt; font-weight:600; color:#F9F7F2;">개발</p>
      </div>
      <div style="display:flex; align-items:center; gap:12pt;">
        <span style="color:#EC5B13; font-size:14pt; font-weight:800;">✓</span>
        <p style="font-family:'Noto Serif KR',serif; font-size:16pt; font-weight:600; color:#F9F7F2;">배포</p>
      </div>
      <div style="display:flex; align-items:center; gap:12pt;">
        <span style="color:#EC5B13; font-size:14pt; font-weight:800;">✓</span>
        <p style="font-family:'Noto Serif KR',serif; font-size:16pt; font-weight:600; color:#F9F7F2;">지표</p>
      </div>
    </div>
    <p style="font-size:9pt; color:#6B5F56; margin-top:4pt;">코딩 없이, 전부 했습니다.</p>
  </div>

  <!-- 오른쪽: 남은 것 -->
  <div style="width:280pt; background:#EC5B13; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:40pt 32pt; gap:12pt;">
    <p style="font-size:8pt; color:rgba(255,255,255,0.6); font-weight:700; letter-spacing:0.2em;">그런데</p>
    <p style="font-family:'Noto Serif KR',serif; font-size:28pt; font-weight:700; color:#fff; line-height:1.3; text-align:center;">어떻게<br>알릴까</p>
    <p style="font-size:9pt; color:rgba(255,255,255,0.5); margin-top:4pt; text-align:center;">이게 남았습니다.</p>
  </div>

  <!-- 페이지 번호 -->
  <div style="position:absolute; top:40pt; right:56pt;">
    <p style="font-size:10pt; color:#6B5F56;">26 / 27</p>
  </div>
</body>
</html>
