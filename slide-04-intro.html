<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 720pt; height: 405pt; font-family: 'Pretendard', sans-serif; background: #F9F7F2; padding: 40pt 56pt; display: flex; flex-direction: column; }
  </style>
</head>
<body>
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24pt;">
    <div style="display:flex; align-items:center; gap:10pt;">
      <p style="padding:3pt 10pt; background:#EC5B13; color:#fff; border-radius:4pt; font-size:8pt; font-weight:700;">SECTION 01 — 서비스 소개</p>
      <h2 style="font-family:'Noto Serif KR',serif; font-size:20pt; font-weight:600; color:#2C2420;">philo 소개</h2>
    </div>
    <p style="font-size:10pt; color:#6B5F56;">5 / 24</p>
  </div>

  <div style="flex:1; display:grid; grid-template-columns:1fr 1fr; gap:24pt; align-items:start;">
    <!-- 왼쪽: 서비스 소개 -->
    <div style="display:flex; flex-direction:column; gap:12pt;">
      <div style="background:#2C2420; border-radius:12pt; padding:20pt;">
        <div style="display:flex; align-items:center; gap:8pt; margin-bottom:12pt;">
          <div style="width:18pt; height:18pt; background:#EC5B13; border-radius:4pt;"></div>
          <span style="font-family:'Noto Serif KR',serif; font-weight:700; font-size:14pt; color:#F9F7F2;">오늘의철학</span>
        </div>
        <p style="font-size:10pt; color:#9a8a82; line-height:1.7;">철학 입문자를 위한 일일 큐레이션 웹앱. 매일 고민을 입력하면 철학자의 지혜로 처방해드립니다.</p>
      </div>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:8pt;">
        <div style="background:#fff; border-radius:8pt; padding:12pt; text-align:center;">
          <p style="font-size:20pt; margin-bottom:4pt;">🌿</p>
          <p style="font-size:9pt; font-weight:700; color:#2C2420;">오늘의 처방</p>
        </div>
        <div style="background:#fff; border-radius:8pt; padding:12pt; text-align:center;">
          <p style="font-size:20pt; margin-bottom:4pt;">🧩</p>
          <p style="font-size:9pt; font-weight:700; color:#2C2420;">철학자 유형 퀴즈</p>
        </div>
        <div style="background:#fff; border-radius:8pt; padding:12pt; text-align:center;">
          <p style="font-size:20pt; margin-bottom:4pt;">📖</p>
          <p style="font-size:9pt; font-weight:700; color:#2C2420;">1분 철학 카드</p>
        </div>
        <div style="background:#fff; border-radius:8pt; padding:12pt; text-align:center;">
          <p style="font-size:20pt; margin-bottom:4pt;">🔔</p>
          <p style="font-size:9pt; font-weight:700; color:#2C2420;">웹푸시 알림</p>
        </div>
      </div>
    </div>

    <!-- 오른쪽: 실제 앱 화면 스크린샷 -->
    <div style="display:flex; flex-direction:column; gap:8pt; align-items:center;">
      <p style="font-size:8pt; color:#6B5F56; font-weight:600; letter-spacing:0.1em; align-self:flex-start;">ACTUAL DESIGN (Stitch)</p>
      <div style="display:flex; gap:8pt; width:100%;">
        <div style="flex:1; border-radius:10pt; overflow:hidden; box-shadow:0 4pt 16pt rgba(44,36,32,0.12);">
          <img src="3595666abbea433fbf994db4599bf394.png" style="width:100%; height:auto; display:block;" alt="홈 화면"/>
        </div>
        <div style="flex:1; border-radius:10pt; overflow:hidden; box-shadow:0 4pt 16pt rgba(44,36,32,0.12);">
          <img src="58095d23602c4eb19125ff036c6476a0.png" style="width:100%; height:auto; display:block;" alt="처방 화면"/>
        </div>
      </div>
      <p style="font-size:8pt; color:#6B5F56; text-align:center;">홈 화면 · 오늘의 처방</p>
    </div>
  </div>
</body>
</html>
