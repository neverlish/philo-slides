<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 720pt; height: 405pt; font-family: 'Pretendard', sans-serif; background: #F9F7F2; padding: 40pt 56pt; display: flex; flex-direction: column; }
  </style>
</head>
<body>
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:18pt;">
    <div style="display:flex; align-items:center; gap:10pt;">
      <p style="padding:3pt 10pt; background:#EC5B13; color:#fff; border-radius:4pt; font-size:8pt; font-weight:700;">SECTION 05 — 인프라</p>
      <h2 style="font-family:'Noto Serif KR',serif; font-size:20pt; font-weight:600; color:#2C2420;">PostHog — 실제로 보는 데이터</h2>
    </div>
    <p style="font-size:10pt; color:#6B5F56;">20 / 23</p>
  </div>

  <div style="flex:1; display:grid; grid-template-columns:1fr 1fr; gap:14pt;">
    <!-- 왼쪽: 대시보드 -->
    <div style="display:flex; flex-direction:column; gap:8pt;">
      <div style="display:flex; align-items:center; gap:6pt;">
        <span style="padding:2pt 8pt; background:#2C2420; color:#F9F7F2; border-radius:4pt; font-size:7pt; font-weight:700;">DASHBOARD</span>
        <p style="font-size:9pt; color:#6B5F56;">DAU · WAU · 리텐션</p>
      </div>
      <div style="flex:1; border-radius:8pt; overflow:hidden; box-shadow:0 3pt 12pt rgba(44,36,32,0.12); border:1px solid #e0d8d4;">
        <img src="posthog-dashboard.png" style="width:100%; height:100%; object-fit:cover; object-position:top left;" alt="PostHog 대시보드"/>
      </div>
    </div>

    <!-- 오른쪽: 퍼널 목록 -->
    <div style="display:flex; flex-direction:column; gap:8pt;">
      <div style="display:flex; align-items:center; gap:6pt;">
        <span style="padding:2pt 8pt; background:#EC5B13; color:#fff; border-radius:4pt; font-size:7pt; font-weight:700;">INSIGHTS</span>
        <p style="font-size:9pt; color:#6B5F56;">MCP로 직접 생성한 퍼널들</p>
      </div>
      <div style="flex:1; border-radius:8pt; overflow:hidden; box-shadow:0 3pt 12pt rgba(44,36,32,0.12); border:1px solid #e0d8d4;">
        <img src="posthog-funnels.png" style="width:100%; height:100%; object-fit:cover; object-position:top left;" alt="PostHog 퍼널 목록"/>
      </div>
    </div>
  </div>

  <div style="margin-top:10pt; background:#2C2420; border-radius:8pt; padding:10pt 16pt; display:flex; align-items:center; gap:10pt;">
    <p style="font-size:8pt; color:#EC5B13; font-weight:700; white-space:nowrap;">PostHog MCP</p>
    <p style="font-size:9pt; color:#9a8a82; line-height:1.5;">Claude가 직접 Insight를 생성 → 터미널 없이 퍼널 분석 · 리텐션 추적 · 이터레이션 근거 확보</p>
  </div>
</body>
</html>
